<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Battle-SE</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    #gameCanvas {
      display: block;
      touch-action: none;
    }

    #hud {
      z-index: 10;
    }

    #gearBtn {
      position: fixed;
      top: 10px;
      left: 10px;
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      font-size: 20px;
      line-height: 38px;
      text-align: center;
      z-index: 30;
      pointer-events: auto;
      cursor: pointer;
    }

    #settingsPanel {
      position: fixed;
      top: 58px;
      left: 10px;
      width: 240px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.82);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      z-index: 31;
      display: none;
      pointer-events: auto;
      font-family: sans-serif;
    }

    #settingsPanel .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0;
    }

    #closeSettingsBtn {
      margin-top: 10px;
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      cursor: pointer;
    }

    #mobileControls {
      position: fixed;
      inset: 0;
      z-index: 25;
      pointer-events: none;
      display: none;
    }

    #joystick {
      position: fixed;
      left: 18px;
      bottom: 18px;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      border: 2px solid rgba(255, 255, 255, 0.10);
      pointer-events: auto;
      touch-action: none;
    }

    #joystickStick {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 56px;
      height: 56px;
      margin-left: -28px;
      margin-top: -28px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.20);
      border: 2px solid rgba(255, 255, 255, 0.14);
      transform: translate(0px, 0px);
    }

    .mobileBtn {
      position: fixed;
      right: 18px;
      width: 86px;
      height: 86px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.10);
      border: 2px solid rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.92);
      font-size: 16px;
      pointer-events: auto;
      touch-action: none;
    }

    #fireBtn {
      bottom: 18px;
    }

    #reloadBtn {
      bottom: 114px;
    }

    #jumpBtn {
      bottom: 210px;
    }
  </style>
</head>
<body>

  <canvas id="gameCanvas"></canvas>

  <button id="gearBtn" aria-label="设置">⚙</button>

  <div id="settingsPanel">
    <div style="font-size:18px; margin-bottom:8px;">设置</div>

    <div class="row">
      <input type="checkbox" id="mobileModeCheckbox">
      <label for="mobileModeCheckbox">手机版</label>
    </div>

    <div style="font-size:13px; line-height:1.5; opacity:0.85;">
      勾选后会显示左下角摇杆、右下角开火和换弹按钮。<br>
      另外我加了一个透明跳跃键，不然手机版没法跳。
    </div>

    <button id="closeSettingsBtn">退出设置</button>
  </div>

  <div id="mobileControls">
    <div id="joystick">
      <div id="joystickStick"></div>
    </div>

    <button id="jumpBtn" class="mobileBtn">跳</button>
    <button id="reloadBtn" class="mobileBtn">换弹</button>
    <button id="fireBtn" class="mobileBtn">开火</button>
  </div>

  <div id="hud" style="position:fixed; left:0; top:0; width:100%; height:100%; pointer-events:none;">
    <div id="killFeed" style="position:absolute; top:10px; left:50%; transform:translateX(-50%); padding:6px 12px; background:rgba(0,0,0,0.55); color:#fff; font-size:16px; pointer-events:auto; cursor:pointer;">
      击杀提示（点击查看排行榜）
    </div>

    <div id="ammoHud" style="position:absolute; top:10px; right:10px; padding:6px 12px; background:rgba(0,0,0,0.55); color:#fff; font-size:16px;">
      30/30
    </div>

    <div id="scoreboard" style="position:absolute; top:52px; left:50%; transform:translateX(-50%); min-width:240px; padding:12px 16px; background:rgba(255,255,255,0.92); color:#000; font-size:16px; display:none; pointer-events:auto;">
    </div>
  </div>

  <script src="map1.js"></script>
  <script src="AWbullet.js"></script>
  <script src="weapon.js"></script>
  <script src="bot.js"></script>
  <script src="player.js"></script>
  <script src="main.js"></script>
</body>
</html>
